# =============================================
# SERVER CONFIGURATION
# =============================================
server.port=8080
server.servlet.context-path=/api

# =============================================
# STATIC RESOURCES CONFIGURATION
# =============================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# =============================================
# DATABASE CONFIGURATION (SQL Server)
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SteelManagementDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=minhd
spring.datasource.password=minhd12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =============================================
# JPA CONFIGURATION
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# =============================================
# LOGGING
# =============================================
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO
logging.level.com.steelmanagement=DEBUG

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl